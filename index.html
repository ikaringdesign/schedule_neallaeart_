    function drawSingleText(context,text,x,y,style){const rad=style.rotate?style.rotate*Math.PI/180:0;if(rad){context.save();context.translate(x,y);context.rotate(rad);x=0;y=0;}context.font=style.weight+' '+style.size+' "'+style.font+'"';context.fillStyle=style.color;context.textAlign=style.align;if('letterSpacing'in context)context.letterSpacing=style.letterSpacing||"0px";if(style.strokeColor&&style.strokeWidth){context.strokeStyle=style.strokeColor;context.lineWidth=style.strokeWidth;context.lineJoin="round";context.strokeText(text,x,y);}context.fillText(text,x,y);if('letterSpacing'in context)context.letterSpacing="0px";if(rad)context.restore();}
    function wrapText(context,text,x,y,maxWidth,style){const subFont=style.subFont||null;function parseSegments(raw){const segs=[];const firstJP=raw.indexOf('[JP]');if(firstJP>0)segs.push({t:raw.slice(0,firstJP),jp:false});else if(firstJP===-1){segs.push({t:raw,jp:false});return segs;}const parts=raw.slice(firstJP).split('[JP]').filter((_,i)=>i>0);parts.forEach(p=>segs.push({t:p,jp:true}));return segs;}const lineHeight=parseInt(style.size)*(style.lineHeight||1.4);const paragraphs=text.split('//').map(p=>p.trim());const allLines=[];function setFont(jp){const f=(jp&&subFont)?subFont:style.font;context.font=style.weight+' '+style.size+' "'+f+'"';}for(const para of paragraphs){const segs=parseSegments(para);const chars=[];segs.forEach(s=>{for(const ch of s.t)chars.push({ch,jp:s.jp&&!!subFont});});let lineChars=[],lineWidth=0;for(const c of chars){setFont(c.jp);const cw=context.measureText(c.ch).width;if(lineWidth+cw>maxWidth&&lineChars.length>0){allLines.push(lineChars);lineChars=[];lineWidth=0;}lineChars.push({...c,w:cw});lineWidth+=cw;}if(lineChars.length>0)allLines.push(lineChars);}const startY=y-((allLines.length-1)*lineHeight)/2;allLines.forEach((lineChars,li)=>{const ly=startY+li*lineHeight;const totalW=lineChars.reduce((s,c)=>s+c.w,0);let cx;if(style.align==='center')cx=x-totalW/2;else if(style.align==='right')cx=x-totalW;else cx=x;for(const c of lineChars){setFont(c.jp);context.fillStyle=style.color;context.textAlign='left';context.textBaseline='middle';if('letterSpacing'in context)context.letterSpacing=style.letterSpacing||'0px';if(style.strokeColor&&style.strokeWidth){context.strokeStyle=style.strokeColor;context.lineWidth=style.strokeWidth;context.lineJoin='round';context.strokeText(c.ch,cx,ly);}context.fillText(c.ch,cx,ly);cx+=c.w;}});if('letterSpacing'in context)context.letterSpacing='0px';context.textAlign=style.align;}
    function draw3SliceHorizontal(ctx,img,x,y,w,h,leftSlice,rightSlice){if(!img||!img.width)return;const sw2=img.width-leftSlice-rightSlice;const dw2=Math.ceil(w)-leftSlice-rightSlice;if(sw2<0||dw2<0)return;const dx=Math.floor(x),dy=Math.floor(y),dh=Math.ceil(h);ctx.drawImage(img,0,0,leftSlice,img.height,dx,dy,leftSlice,dh);ctx.drawImage(img,leftSlice,0,sw2,img.height,dx+leftSlice-0.5,dy,dw2+1,dh);ctx.drawImage(img,leftSlice+sw2,0,rightSlice,img.height,dx+leftSlice+dw2,dy,rightSlice,dh);}
    async function drawSchedule(){if(isDrawing){needsRedraw=true;return;}isDrawing=true;try{const[mainBg,iconChzzk,iconYoutube,iconTwitch,iconSoop,artistBgImg]=await Promise.all([getCachedImage(config.imgSrc),getCachedImage(config.platforms.chzzk),getCachedImage(config.platforms.youtube),getCachedImage(config.platforms.twitch),getCachedImage(config.platforms.soop),getCachedImage(config.artistBgImage)]);ctx.fillStyle="#ffffff";ctx.fillRect(0,0,canvas.width,canvas.height);if(uploadedIllust){const w=uploadedIllust.width*imgState.scale;const h=uploadedIllust.height*imgState.scale;const cx=imgState.x+w/2;const cy=imgState.y+h/2;ctx.save();ctx.translate(cx,cy);if(imgState.rotate)ctx.rotate(imgState.rotate*Math.PI/180);ctx.scale(imgState.flipH?-1:1,imgState.flipV?-1:1);ctx.drawImage(uploadedIllust,-w/2,-h/2,w,h);ctx.restore();}if(!mainBg){ctx.fillStyle="#333333";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#ff6b6b";ctx.font="bold 50px 'Malgun Gothic'";ctx.textAlign="center";ctx.fillText("배경 이미지(image/bg.png)를 찾을 수 없습니다!",canvas.width/2,canvas.height/2-50);}else{ctx.drawImage(mainBg,0,0,canvas.width,canvas.height);}if(weekData.startMonth){const tc=config.topDateCoords;ctx.textBaseline="middle";drawSingleText(ctx,weekData.startMonth,tc.startMonth[0],tc.startMonth[1],config.textStyles.topMonth);drawSingleText(ctx,weekData.endMonth,tc.endMonth[0],tc.endMonth[1],config.textStyles.topMonth);drawSingleText(ctx,weekData.startDate,tc.startDate[0],tc.startDate[1],config.textStyles.topDay);drawSingleText(ctx,weekData.endDate,tc.endDate[0],tc.endDate[1],config.textStyles.topDay);const startText=weekData.startMonth+'.'+weekData.startDate;const endText=weekData.endMonth+'.'+weekData.endDate;if(config.dateRangeStartCoords){const[sx,sy]=config.dateRangeStartCoords;drawSingleText(ctx,startText,sx,sy,config.textStyles.dateRangeStart||{});}if(config.dateRangeEndCoords){const[ex,ey]=config.dateRangeEndCoords;drawSingleText(ctx,endText,ex,ey,config.textStyles.dateRangeEnd||{});}}const iconMap={chzzk:iconChzzk,youtube:iconYoutube,twitch:iconTwitch,soop:iconSoop};ctx.textBaseline="middle";for(const[i,day]of['mon','tue','wed','thu','fri','sat','sun'].entries()){const dc=config.dayConfig[day];if(!dc)continue;const[boxX,boxY]=dc.boxCoords;const[boxW,boxH]=dc.boxSize;const isOnline=document.getElementById(day+'_type').checked;const boxImg=await getCachedImage(isOnline?dc.boxOn:dc.boxOff);if(boxImg){ctx.drawImage(boxImg,boxX,boxY,boxW,boxH);}else{ctx.fillStyle=isOnline?'#bbdefb':'#fff9c4';ctx.globalAlpha=0.8;ctx.fillRect(boxX,boxY,boxW,boxH);ctx.globalAlpha=1.0;}if(weekData.dayTexts[i]){const dateStyle=isOnline?(config.textStyles.dayDateOn||config.textStyles.dayDate):(config.textStyles.dayDateOff||config.textStyles.dayDate);const dateCoords=isOnline?config.innerCoords.dateOn:config.innerCoords.dateOff;drawSingleText(ctx,weekData.dayTexts[i],boxX+dateCoords[0],boxY+dateCoords[1],dateStyle);}if(isOnline){const main=document.getElementById(day).value;if(main)wrapText(ctx,main,boxX+config.innerCoords.title[0],boxY+config.innerCoords.title[1],config.textMaxWidth,config.textStyles.mainTitle);const sub=document.getElementById(day+'_sub').value;if(sub)wrapText(ctx,sub,boxX+config.innerCoords.sub[0],boxY+config.innerCoords.sub[1],config.textMaxWidth,config.textStyles.subTitle);const time=document.getElementById(day+'_time').value;if(time)drawSingleText(ctx,time,boxX+config.innerCoords.time[0],boxY+config.innerCoords.time[1],config.textStyles.time);const icon=iconMap[document.getElementById(day+'_platform').value];if(icon)ctx.drawImage(icon,boxX+config.innerCoords.icon[0],boxY+config.innerCoords.icon[1],config.iconSize[0],config.iconSize[1]);const dayAmPm=document.getElementById(day+'_ampm')?.value||'AM';if(config.innerCoords.amPm&&(config.innerCoords.amPm[0]||config.innerCoords.amPm[1])){drawSingleText(ctx,dayAmPm,boxX+config.innerCoords.amPm[0],boxY+config.innerCoords.amPm[1],config.textStyles.amPm||config.textStyles.time);}}}const artistName=document.getElementById('artistName').value;if(artistName){ctx.textBaseline="middle";drawSingleText(ctx,"ART BY",config.artistLabelCoords[0],config.artistLabelCoords[1],config.textStyles.artistLabel);const nStyle=config.textStyles.artist;ctx.font=nStyle.weight+' '+nStyle.size+' "'+nStyle.font+'"';if('letterSpacing'in ctx)ctx.letterSpacing=nStyle.letterSpacing||"0px";const nameW=ctx.measureText(artistName).width;const boxW=nameW+config.artistPadding[0]*2;const boxH=parseInt(nStyle.size)+config.artistPadding[1]*2;const boxX=config.artistCoords[0]-boxW;const boxY=config.artistCoords[1]-boxH;if(artistBgImg){draw3SliceHorizontal(ctx,artistBgImg,boxX,boxY,boxW,boxH,config.artistBgSlice[0],config.artistBgSlice[1]);}drawSingleText(ctx,artistName,boxX+boxW-config.artistPadding[0],boxY+boxH/2+2,nStyle);if('letterSpacing'in ctx)ctx.letterSpacing="0px";}}finally{isDrawing=false;if(needsRedraw){needsRedraw=false;drawSchedule();}}}
    function saveData(showAlert=false){const data={};document.querySelectorAll('.sched-input,.sched-select').forEach(el=>{data[el.id]=el.value;});document.querySelectorAll('.sched-toggle').forEach(chk=>{data[chk.id]=chk.checked;});data.illust=illustBase64;data.imgState=imgState;try{localStorage.setItem('scheduleDataFinal',JSON.stringify(data));}catch{data.illust=null;localStorage.setItem('scheduleDataFinal',JSON.stringify(data));if(showAlert)alert("첨부된 이미지 용량이 커서 브라우저에 임시 저장할 수 없습니다.");}}
    function loadData(){const saved=localStorage.getItem('scheduleDataFinal');if(!saved)return;const data=JSON.parse(saved);for(const key in data){if(key==='imgState'||key==='illust')continue;const el=document.getElementById(key);if(el)el.type==='checkbox'?(el.checked=data[key]):(el.value=data[key]);}if(data.imgState)imgState=data.imgState;if(data.illust){illustBase64=data.illust;loadIllustImage(illustBase64,false);document.getElementById('uploadFileName').textContent="저장된 일러스트 불러옴";document.getElementById('dropZone').style.display='none';document.getElementById('uploadPreview').style.display='block';document.getElementById('imageControlPanel').style.display='block';canvas.classList.add('draggable');}if(document.getElementById('weekPicker').value)handleDateSelect();['mon','tue','wed','thu','fri','sat','sun'].forEach(day=>{toggleInputs(day);const ti=document.getElementById(day+'_time');const tb=document.getElementById(day+'_timebtn');if(ti&&tb&&ti.value)tb.textContent=ti.value;});}
    function clearData(){if(!confirm("모든 텍스트를 초기화하시겠습니까?"))return;document.querySelectorAll('.sched-input').forEach(el=>{el.value='';});document.querySelectorAll('.platform-select').forEach(el=>{el.value='none';});document.querySelectorAll('.sched-toggle').forEach(toggle=>{toggle.checked=true;toggleInputs(toggle.id.replace('_type',''));});removeIllust();['mon','tue','wed','thu','fri','sat','sun'].forEach(d=>{const tb=document.getElementById(d+'_timebtn');if(tb)tb.textContent='시간';});weekData={startMonth:"",startDate:"",endMonth:"",endDate:"",dayTexts:[]};saveData();drawSchedule();}
    async function waitFonts(){const seen=new Set();const loads=[];Object.values(config.textStyles).forEach(s=>{if(s&&s.font&&!seen.has(s.font)){seen.add(s.font);loads.push(document.fonts.load(s.weight+' 32px "'+s.font+'"').catch(()=>{}));}});await document.fonts.ready;await Promise.all(loads);}
    window.onload=function(){setupDropZone();setupCanvasDrag();['mon','tue','wed','thu','fri','sat','sun'].forEach(d=>{const el=document.getElementById(d+'_ampm');if(el&&!localStorage.getItem('scheduleDataFinal'))el.value='AM';});const saved=localStorage.getItem('scheduleDataFinal');if(saved)loadData();else['mon','tue','wed','thu','fri','sat','sun'].forEach(day=>toggleInputs(day));waitFonts().then(()=>drawSchedule());document.querySelectorAll('input,select').forEach(el=>{if(el.id!=='weekPicker'&&el.type!=='file'&&el.id!=='zoomSlider'){el.addEventListener('input',()=>{saveData();drawSchedule();});el.addEventListener('change',()=>{saveData();drawSchedule();});}});};
    async function downloadImage(){try{await drawSchedule();const link=document.createElement('a');link.download='weekly_schedule_fhd.png';link.href=canvas.toDataURL('image/png');link.click();}catch{alert("이미지 저장 실패!\nVS Code에서 Live Server로 열어주세요!");}}
    (function(){
      let _ti=null,_selH=19,_selM=0;
      const H=Array.from({length:24},(_,i)=>i),M=Array.from({length:12},(_,i)=>i*5);
      function buildList(el,items,sel,fmt,onSel){el.innerHTML='';items.forEach(v=>{const d=document.createElement('div');d.className='drum-item'+(v===sel?' selected':'');d.textContent=fmt(v);d.dataset.val=v;d.onclick=()=>{onSel(v);scrollTo(el,v,items,true);};el.appendChild(d);});}
      function scrollTo(el,val,items,anim){const idx=items.indexOf(val);if(idx<0)return;if(!anim)el.style.transition='none';el.style.transform='translateY(-'+(idx*40)+'px)';if(!anim)setTimeout(()=>el.style.transition='transform 0.15s ease',10);el.querySelectorAll('.drum-item').forEach(d=>d.classList.toggle('selected',+d.dataset.val===val));}
      function setupScroll(se,le,items,gv,sv){let sY=0,sTY=0,drag=false;function getTY(){return Math.abs(parseInt(le.style.transform.replace('translateY(',''))||0);}function clamp(v){return Math.max(0,Math.min((items.length-1)*40,v));}function snap(){const idx=Math.max(0,Math.min(items.length-1,Math.round(getTY()/40)));sv(items[idx]);le.style.transition='transform 0.15s ease';le.style.transform='translateY(-'+(idx*40)+'px)';le.querySelectorAll('.drum-item').forEach(d=>d.classList.toggle('selected',+d.dataset.val===items[idx]));}
      se.addEventListener('mousedown',e=>{drag=true;sY=e.clientY;sTY=getTY();le.style.transition='none';e.preventDefault();});
      window.addEventListener('mousemove',e=>{if(!drag)return;le.style.transform='translateY(-'+clamp(sTY+(sY-e.clientY))+'px)';});
      window.addEventListener('mouseup',()=>{if(!drag)return;drag=false;snap();});
      se.addEventListener('touchstart',e=>{drag=true;sY=e.touches[0].clientY;sTY=getTY();le.style.transition='none';e.preventDefault();},{passive:false});
      window.addEventListener('touchmove',e=>{if(!drag)return;le.style.transform='translateY(-'+clamp(sTY+(sY-e.touches[0].clientY))+'px)';},{passive:true});
      window.addEventListener('touchend',()=>{if(!drag)return;drag=false;snap();});
      se.addEventListener('wheel',e=>{e.preventDefault();const idx=items.indexOf(gv());const ni=Math.max(0,Math.min(items.length-1,idx+(e.deltaY>0?1:-1)));sv(items[ni]);scrollTo(le,items[ni],items,true);},{passive:false});}
      window.openDrumPicker=function(inp,btn){_ti=inp;const p=inp.value.match(/(\d+):(\d+)/);_selH=p?+p[1]:19;_selM=p?Math.round(+p[2]/5)*5%60:0;if(_selM===60)_selM=55;
      buildList(document.getElementById('drumHourList'),H,_selH,h=>String(h).padStart(2,'0'),v=>_selH=v);
      buildList(document.getElementById('drumMinList'),M,_selM,m=>String(m).padStart(2,'0'),v=>_selM=v);
      setupScroll(document.getElementById('drumHourScroll'),document.getElementById('drumHourList'),H,()=>_selH,v=>_selH=v);
      setupScroll(document.getElementById('drumMinScroll'),document.getElementById('drumMinList'),M,()=>_selM,v=>_selM=v);
      setTimeout(()=>{scrollTo(document.getElementById('drumHourList'),_selH,H,false);scrollTo(document.getElementById('drumMinList'),_selM,M,false);},0);
      const pop=document.getElementById('drumPopup');const r=btn.getBoundingClientRect();
      pop.style.top=(r.bottom+6)+'px';pop.style.left=Math.min(r.left,window.innerWidth-210)+'px';
      pop.classList.add('open');document.getElementById('drumOverlay').classList.add('open');};
      window.closeDrumPicker=function(){document.getElementById('drumPopup').classList.remove('open');document.getElementById('drumOverlay').classList.remove('open');};
      window.confirmDrumPicker=function(){if(_ti){_ti.value=String(_selH).padStart(2,'0')+':'+String(_selM).padStart(2,'0');const btn=document.getElementById(_ti.id+'btn');if(btn)btn.textContent=_ti.value;_ti.dispatchEvent(new Event('input',{bubbles:true}));_ti.dispatchEvent(new Event('change',{bubbles:true}));}closeDrumPicker();};
    })();
