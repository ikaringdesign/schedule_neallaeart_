    function loadIllustImage(src,isNewUpload=false){if(!src){uploadedIllust=null;drawSchedule();return;}const img=new Image();img.onload=function(){uploadedIllust=img;if(isNewUpload){const[,,boxW,boxH]=config.illustBox;const baseScale=Math.min(boxW/img.width,boxH/img.height);imgState.scale=baseScale;imgState.x=config.illustBox[0]+(boxW-img.width*baseScale)/2;imgState.y=config.illustBox[1]+(boxH-img.height*baseScale)/2;imgState.rotate=0;imgState.flipH=false;imgState.flipV=false;initImgState={scale:baseScale,x:imgState.x,y:imgState.y};const slider=document.getElementById('zoomSlider');slider.min=baseScale*0.01;slider.max=baseScale*3;slider.value=baseScale;document.getElementById('rotateSlider').value=0;document.getElementById('rotateVal').textContent='0°';document.getElementById('flipHBtn').classList.remove('active');document.getElementById('flipVBtn').classList.remove('active');saveData(true);}else{document.getElementById('zoomSlider').value=imgState.scale;document.getElementById('rotateSlider').value=imgState.rotate||0;document.getElementById('rotateVal').textContent=(imgState.rotate||0)+'°';document.getElementById('flipHBtn').classList.toggle('active',!!imgState.flipH);document.getElementById('flipVBtn').classList.toggle('active',!!imgState.flipV);}drawSchedule();};img.src=src;}

    function drawSingleText(context,text,x,y,style){const rad=style.rotate?style.rotate*Math.PI/180:0;if(rad){context.save();context.translate(x,y);context.rotate(rad);x=0;y=0;}context.font=style.weight+' '+style.size+' "'+style.font+'"';context.fillStyle=style.color;context.textAlign=style.align;if('letterSpacing'in context)context.letterSpacing=style.letterSpacing||"0px";if(style.shadow){const s=style.shadow;context.shadowColor=s.color||'rgba(0,0,0,0.4)';context.shadowBlur=s.blur||4;context.shadowOffsetX=s.x||0;context.shadowOffsetY=s.y||0;}if(style.strokeColor&&style.strokeWidth){context.strokeStyle=style.strokeColor;context.lineWidth=style.strokeWidth;context.lineJoin="round";context.strokeText(text,x,y);}context.fillText(text,x,y);context.shadowColor='transparent';context.shadowBlur=0;context.shadowOffsetX=0;context.shadowOffsetY=0;if('letterSpacing'in context)context.letterSpacing="0px";if(rad)context.restore();}
    function wrapText(context,text,x,y,maxWidth,style){const lineHeight=parseInt(style.size)*(style.lineHeight||1.4);const paragraphs=text.split('//').map(p=>p.trim());const allLines=[];context.font=style.weight+' '+style.size+' "'+style.font+'"';if('letterSpacing'in context)context.letterSpacing=style.letterSpacing||'0px';for(const para of paragraphs){const words=para.split('');let line='';for(const ch of words){const test=line+ch;if(context.measureText(test).width>maxWidth&&line.length>0){allLines.push(line);line=ch;}else{line=test;}}if(line.length>0)allLines.push(line);}const startY=y-((allLines.length-1)*lineHeight)/2;context.fillStyle=style.color;context.textBaseline='middle';if(style.shadow){const s=style.shadow;context.shadowColor=s.color||'rgba(0,0,0,0.4)';context.shadowBlur=s.blur||4;context.shadowOffsetX=s.x||0;context.shadowOffsetY=s.y||0;}allLines.forEach((line,li)=>{const ly=startY+li*lineHeight;const tw=context.measureText(line).width;let cx;if(style.align==='center')cx=x-tw/2;else if(style.align==='right')cx=x-tw;else cx=x;context.textAlign='left';if(style.strokeColor&&style.strokeWidth){context.strokeStyle=style.strokeColor;context.lineWidth=style.strokeWidth;context.lineJoin='round';context.strokeText(line,cx,ly);}context.fillText(line,cx,ly);});context.shadowColor='transparent';context.shadowBlur=0;context.shadowOffsetX=0;context.shadowOffsetY=0;if('letterSpacing'in context)context.letterSpacing='0px';context.textAlign=style.align||'left';}
    function draw3SliceHorizontal(ctx,img,x,y,w,h,leftSlice,rightSlice){if(!img||!img.width)return;const sw2=img.width-leftSlice-rightSlice;const dw2=Math.ceil(w)-leftSlice-rightSlice;if(sw2<0||dw2<0)return;const dx=Math.floor(x),dy=Math.floor(y),dh=Math.ceil(h);ctx.drawImage(img,0,0,leftSlice,img.height,dx,dy,leftSlice,dh);ctx.drawImage(img,leftSlice,0,sw2,img.height,dx+leftSlice-0.5,dy,dw2+1,dh);ctx.drawImage(img,leftSlice+sw2,0,rightSlice,img.height,dx+leftSlice+dw2,dy,rightSlice,dh);}
    async function drawSchedule(){if(isDrawing){needsRedraw=true;return;}isDrawing=true;try{const[mainBg,artistBgImg,topImg]=await Promise.all([getCachedImage(config.imgSrc),getCachedImage(config.artistBgImage),getCachedImage(config.topImageSrc)]);ctx.fillStyle="#ffffff";ctx.fillRect(0,0,canvas.width,canvas.height);if(uploadedIllust){const w=uploadedIllust.width*imgState.scale;const h=uploadedIllust.height*imgState.scale;const cx=imgState.x+w/2;const cy=imgState.y+h/2;ctx.save();ctx.translate(cx,cy);if(imgState.rotate)ctx.rotate(imgState.rotate*Math.PI/180);ctx.scale(imgState.flipH?-1:1,imgState.flipV?-1:1);ctx.drawImage(uploadedIllust,-w/2,-h/2,w,h);ctx.restore();}if(!mainBg){ctx.fillStyle="#333333";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#ff6b6b";ctx.font="bold 50px 'Malgun Gothic'";ctx.textAlign="center";ctx.fillText("배경 이미지(image/bg.png)를 찾을 수 없습니다!",canvas.width/2,canvas.height/2-50);}else{ctx.drawImage(mainBg,0,0,canvas.width,canvas.height);}if(weekData&&weekData.startMonth){const tc=config.topDateCoords;ctx.textBaseline="middle";drawSingleText(ctx,weekData.startMonth,tc.startMonth[0],tc.startMonth[1],config.textStyles.topMonth);drawSingleText(ctx,weekData.endMonth,tc.endMonth[0],tc.endMonth[1],config.textStyles.topMonth);drawSingleText(ctx,weekData.startDate,tc.startDate[0],tc.startDate[1],config.textStyles.topDay);drawSingleText(ctx,weekData.endDate,tc.endDate[0],tc.endDate[1],config.textStyles.topDay);const startText=weekData.startMonth+'.'+weekData.startDate;const endText=weekData.endMonth+'.'+weekData.endDate;if(config.dateRangeStartCoords){const[sx,sy]=config.dateRangeStartCoords;drawSingleText(ctx,startText,sx,sy,config.textStyles.dateRangeStart||{});}if(config.dateRangeEndCoords){const[ex,ey]=config.dateRangeEndCoords;drawSingleText(ctx,endText,ex,ey,config.textStyles.dateRangeEnd||{});}}ctx.textBaseline="middle";for(const[i,day]of['mon','tue','wed','thu','fri','sat','sun'].entries()){const dc=config.dayConfig[day];if(!dc)continue;const[boxX,boxY]=dc.boxCoords;const[boxW,boxH]=dc.boxSize;const isOnline=document.getElementById(day+'_type').checked;const boxImg=await getCachedImage(isOnline?dc.boxOn:dc.boxOff);if(boxImg){ctx.drawImage(boxImg,boxX,boxY,boxW,boxH);}else{ctx.fillStyle=isOnline?'#bbdefb':'#fff9c4';ctx.globalAlpha=0.8;ctx.fillRect(boxX,boxY,boxW,boxH);ctx.globalAlpha=1.0;}if(weekData.dayTexts[i]){const dateStyle=isOnline?(config.textStyles.dayDateOn||config.textStyles.dayDate):(config.textStyles.dayDateOff||config.textStyles.dayDate);const dateCoords=isOnline?config.innerCoords.dateOn:config.innerCoords.dateOff;drawSingleText(ctx,weekData.dayTexts[i],boxX+dateCoords[0],boxY+dateCoords[1],dateStyle);}if(isOnline){const main=document.getElementById(day).value;if(main)wrapText(ctx,main,boxX+config.innerCoords.title[0],boxY+config.innerCoords.title[1],config.textMaxWidth,config.textStyles.mainTitle);const sub=document.getElementById(day+'_sub').value;if(sub)wrapText(ctx,sub,boxX+config.innerCoords.sub[0],boxY+config.innerCoords.sub[1],config.textMaxWidth,config.textStyles.subTitle);}else{const offText=document.getElementById(day+'_off_text')?.value;if(offText)wrapText(ctx,offText,boxX+config.offlineTextCoords[0],boxY+config.offlineTextCoords[1],config.textMaxWidth,Object.assign({},config.textStyles.mainTitle));}}const artistName=document.getElementById('artistName').value;if(artistName){ctx.textBaseline="middle";drawSingleText(ctx,"ART BY",config.artistLabelCoords[0],config.artistLabelCoords[1],config.textStyles.artistLabel);const nStyle=config.textStyles.artist;ctx.font=nStyle.weight+' '+nStyle.size+' "'+nStyle.font+'"';if('letterSpacing'in ctx)ctx.letterSpacing=nStyle.letterSpacing||"0px";const nameW=ctx.measureText(artistName).width;const boxW=nameW+config.artistPadding[0]*2;const boxH=parseInt(nStyle.size)+config.artistPadding[1]*2;const boxX=config.artistCoords[0]-boxW;const boxY=config.artistCoords[1]-boxH;if(artistBgImg){draw3SliceHorizontal(ctx,artistBgImg,boxX,boxY,boxW,boxH,config.artistBgSlice[0],config.artistBgSlice[1]);}drawSingleText(ctx,artistName,boxX+boxW-config.artistPadding[0],boxY+boxH/2+2,nStyle);if('letterSpacing'in ctx)ctx.letterSpacing="0px";}if(topImg&&config.topImageSize[0]>0){ctx.drawImage(topImg,config.topImageCoords[0],config.topImageCoords[1],config.topImageSize[0],config.topImageSize[1]);}}finally{isDrawing=false;if(needsRedraw){needsRedraw=false;drawSchedule();}}}
